services:
  - type: web
    name: fuel-tracker
    env: java
    plan: free
    buildCommand: ./gradlew build -x test
    startCommand: java -jar build/libs/fuel-tracker-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: fuel-tracker-db
          property: connectionString
      - key: PORT
        value: 8080

databases:
  - name: fuel-tracker-db
    engine: postgresql
    ipAllowList: []

